<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 100" width="520" height="100">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;family=Barlow:wght@500&amp;display=swap');
      .wm { font-family: 'Bebas Neue', sans-serif; font-size: 56px; letter-spacing: 0.06em; }
      .tg { font-family: 'Barlow', sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 0.12em; }
    </style>
  </defs>

  <!-- Badge rouge -->
  <rect x="0" y="8" width="84" height="84" rx="14" fill="#CC1919"/>

  <!-- Icône terrain -->
  <!-- Cadre terrain -->
  <rect x="12" y="24" width="60" height="52" rx="3" fill="none" stroke="white" stroke-width="2.2"/>
  <!-- Ligne médiane -->
  <line x1="12" y1="50" x2="72" y2="50" stroke="white" stroke-width="1.8"/>
  <!-- Rond central -->
  <circle cx="42" cy="50" r="10" fill="none" stroke="white" stroke-width="1.8"/>
  <!-- Lignes verticales de tiers -->
  <line x1="28" y1="24" x2="28" y2="76" stroke="white" stroke-width="1.1" opacity="0.45"/>
  <line x1="56" y1="24" x2="56" y2="76" stroke="white" stroke-width="1.1" opacity="0.45"/>
  <!-- Flèche sautante -->
  <line x1="66" y1="16" x2="76" y2="10" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="76" y1="10" x2="74" y2="20" stroke="white" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Wordmark GROUND -->
  <text x="102" y="68" class="wm" fill="#F0F1F3">GROUND</text>
  <!-- Wordmark HOPPER en rouge -->
  <text x="102" y="68" class="wm" fill="#F0F1F3">
    <tspan fill="#F0F1F3">GROUND</tspan><tspan fill="#CC1919">HOPPER</tspan>
  </text>

  <!-- Tagline -->
  <text x="104" y="86" class="tg" fill="#7A8090">TOUR DU MONDE DES STADES</text>
</svg>
